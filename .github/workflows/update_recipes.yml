name: Update Recipe List

on:
  push:
    branches:
      - master
    paths:
      - 'recipes/**'
      - 'update_recipes.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-recipes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run update script
        run: python3 update_recipes.py

      - name: Commit and push changes
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add asset/recipes.json asset/info.json index.html js/app.js
          git commit -m "🔄 Automated update of recipes and version sync" || echo "No changes to commit"
          git pull --rebase origin master || echo "No remote changes to rebase"
          git push
