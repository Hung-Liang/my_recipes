<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的食譜</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="asset/icon.png" />
    <!-- 載入外部 CSS 檔案，路徑已更新為 css/style.css -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- 載入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="container py-8">
      <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-2">
          我的食譜
        </h1>
        <p class="text-lg text-gray-600">
          所有食譜都在這裡，點擊查看詳細內容！
        </p>
      </header>

      <!-- Search and Tags filter section -->
      <div class="mb-8 space-y-6">
        <!-- Search Bar -->
        <div class="relative max-w-xl mx-auto md:mx-0">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input
            id="search-input"
            type="text"
            placeholder="搜尋食譜名稱、描述或標籤..."
            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm shadow-sm transition-all"
          />
        </div>

        <!-- Category Navigation -->
        <div class="flex flex-col space-y-2">
          <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">快速跳轉</h2>
          <div id="category-nav" class="flex flex-wrap gap-2">
            <!-- Category buttons will be injected here -->
          </div>
        </div>

        <div>
          <h2 class="text-2xl font-bold text-gray-900 mb-4">標籤篩選</h2>
          <div id="tags-container" class="flex flex-wrap gap-2 mb-4">
            <!-- Tags will be injected here by JavaScript -->
          </div>
          <div class="text-sm text-gray-600 flex items-center flex-wrap gap-2">
            <span>已選擇標籤：</span>
            <span id="selected-tags" class="font-medium">無</span>
            <button
              id="clear-tags"
              class="text-blue-600 hover:text-blue-800 underline hidden"
            >
              清除所有篩選
            </button>
          </div>
        </div>
      </div>

      <!-- Recipe list section -->
      <div
        id="recipe-list-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- Skeleton placeholders -->
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 animate-pulse">
          <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
          <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6 mb-4"></div>
          <div class="flex gap-2">
            <div class="h-6 bg-gray-200 rounded-full w-12"></div>
            <div class="h-6 bg-gray-200 rounded-full w-16"></div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 animate-pulse hidden md:block">
          <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
          <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6 mb-4"></div>
          <div class="flex gap-2">
            <div class="h-6 bg-gray-200 rounded-full w-12"></div>
            <div class="h-6 bg-gray-200 rounded-full w-16"></div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100 animate-pulse hidden lg:block">
          <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
          <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6 mb-4"></div>
          <div class="flex gap-2">
            <div class="h-6 bg-gray-200 rounded-full w-12"></div>
            <div class="h-6 bg-gray-200 rounded-full w-16"></div>
          </div>
        </div>
      </div>

      <!-- Recipe detail section -->
      <div
        id="recipe-detail-container"
        class="hidden bg-white p-8 rounded-2xl shadow-xl border border-gray-200"
      >
        <button
          id="back-button"
          class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-full transition-colors duration-200 mb-6 flex items-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm.707-10.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 11H13a1 1 0 100-2H9.414l1.293-1.293z"
              clip-rule="evenodd"
            />
          </svg>
          返回食譜清單
        </button>
        <h2
          id="recipe-detail-name"
          class="text-3xl font-bold text-gray-900 mb-4"
        ></h2>
        <p id="recipe-detail-description" class="text-gray-600 mb-6"></p>

        <!-- Servings control section -->
        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
          <div class="flex items-center space-x-4">
            <label
              for="servings-input"
              class="text-lg font-semibold text-gray-700"
              >份數：</label
            >
            <input
              id="servings-input"
              type="number"
              min="0.1"
              step="0.1"
              class="appearance-none block w-20 px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            />
            <span id="servings-unit" class="text-gray-600"></span>
          </div>
        </div>

        <!-- Ingredients and scaling UI -->
        <div class="mb-8">
          <h3 class="text-2xl font-bold text-gray-900 mb-4">材料</h3>
          <ul id="recipe-detail-ingredients" class="space-y-4">
            <!-- Ingredients will be injected here by JavaScript -->
          </ul>
        </div>

        <!-- Steps -->
        <div class="mb-8">
          <h3 class="text-2xl font-bold text-gray-900 mb-4">步驟</h3>
          <ol
            id="recipe-detail-steps"
            class="list-decimal list-inside space-y-2 text-gray-700"
          >
            <!-- Steps will be injected here by JavaScript -->
          </ol>
        </div>

        <!-- Important notes -->
        <div
          id="recipe-detail-notes-container"
          class="mt-8 pt-6 border-t border-gray-200"
        >
          <h3 class="text-2xl font-bold text-gray-900 mb-4">重要事項</h3>
          <ul
            id="recipe-detail-notes"
            class="list-disc list-inside space-y-2 text-gray-700"
          >
            <!-- Notes will be injected here by JavaScript -->
          </ul>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
